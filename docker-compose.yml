version: '3.9'

services:
  tokenix:
    build:
      context: .
      dockerfile: Dockerfile
    image: tokenix:latest
    container_name: tokenix
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=3000
      - ENABLE_PAID_FEATURES=${ENABLE_PAID_FEATURES:-false}
      - ENABLE_BILLING=${ENABLE_BILLING:-false}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
      - STRIPE_PRO_MONTHLY_PRICE_ID=${STRIPE_PRO_MONTHLY_PRICE_ID:-}
      - API_KEY=${API_KEY:-}
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
      - RATE_LIMIT_MAX=${RATE_LIMIT_MAX:-200}
      - RATE_LIMIT_HEAVY_MAX=${RATE_LIMIT_HEAVY_MAX:-30}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    # Optional: mount a .env file for local overrides
    # env_file:
    #   - .env

