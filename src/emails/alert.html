<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Tokenia Alert</title>
<style>
  body{margin:0;padding:0;background:#0A0A0A;font-family:monospace;}
  .wrapper{max-width:560px;margin:0 auto;padding:32px 16px;}
  .card{background:#171717;border:1px solid #2E2E2E;border-radius:12px;overflow:hidden;}
  .header{background:#dc2626;padding:20px 24px;display:flex;align-items:center;gap:10px;}
  .header-text{color:#fff;font-size:16px;font-weight:700;}
  .body{padding:24px;}
  .detail-row{display:flex;gap:12px;padding:8px 0;border-bottom:1px solid #262626;font-size:13px;}
  .detail-key{color:#737373;min-width:120px;font-weight:600;}
  .detail-val{color:#FAFAFA;font-family:monospace;}
  .footer{padding:16px;text-align:center;font-size:12px;color:#737373;}
  a{color:#FF8B4C;}
</style>
</head>
<body>
<div class="wrapper">
  <div class="card">
    <div class="header"><span style="font-size:24px">⚠️</span><span class="header-text">Tokenia Health Alert</span></div>
    <div class="body">
      <div class="detail-row"><span class="detail-key">Status</span><span class="detail-val" style="color:#f87171;">{{status}}</span></div>
      <div class="detail-row"><span class="detail-key">Error</span><span class="detail-val">{{error_message}}</span></div>
      <div class="detail-row"><span class="detail-key">Time</span><span class="detail-val">{{timestamp}}</span></div>
      <div class="detail-row"><span class="detail-key">Environment</span><span class="detail-val">{{environment}}</span></div>
      <div class="detail-row"><span class="detail-key">Check URL</span><span class="detail-val"><a href="https://tokenia.live/api/health">tokenia.live/api/health</a></span></div>
      <div style="margin-top:20px;padding:12px;background:#1C1C1C;border-radius:8px;font-size:12px;color:#737373;">
        This alert was sent automatically by Tokenia's internal heartbeat monitor.<br>
        Check <a href="https://tokenia.live/status.html">tokenia.live/status.html</a> for live status.
      </div>
    </div>
  </div>
  <div class="footer"><a href="https://tokenia.live">tokenia.live</a></div>
</div>
</body>
</html>
