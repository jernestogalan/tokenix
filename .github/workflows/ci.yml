name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Lint + Test ─────────────────────────────────────────────────────────────
  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: ['18', '20', '22']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint (basic syntax check)
        run: |
          node --check server.js
          node --check src/tokenizers/index.js
          node --check src/parsers/index.js
          node --check src/cleaner/index.js
          node --check src/retriever/index.js

      - name: Unit tests — cleaner
        run: node --test test/cleaner.test.js

      - name: Unit tests — retriever
        run: node --test test/retriever.test.js

      - name: Unit tests — tokenizers
        run: node --test test/tokenizers.test.js

      - name: Integration tests — API
        # Run separately to avoid ERR_INVALID_PACKAGE_CONFIG in --test subprocess spawner
        run: node --test test/api.test.js
        env:
          ENABLE_PAID_FEATURES: 'true'
          NODE_ENV: test

  # ── Docker build check ──────────────────────────────────────────────────────
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: test   # only build if tests pass

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: tokenix:ci
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Smoke-test container
        run: |
          docker run -d --name tokenix-smoke -p 3001:3000 \
            -e NODE_ENV=production \
            -e ENABLE_PAID_FEATURES=false \
            tokenix:ci
          # Wait for server to be ready (max 15 s)
          for i in $(seq 1 15); do
            curl -sf http://localhost:3001/api/health && break
            sleep 1
          done
          # Verify health response
          HEALTH=$(curl -sf http://localhost:3001/api/health)
          echo "Health: $HEALTH"
          echo "$HEALTH" | grep -q '"status":"ok"'
          docker stop tokenix-smoke

  # ── Publish (optional — only on main branch push) ───────────────────────────
  # Uncomment and configure DOCKERHUB_USERNAME / DOCKERHUB_TOKEN secrets to push.
