<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tokenia Admin — Analytics Dashboard</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #0A0A0A; color: #FAFAFA; min-height: 100vh; }
    .header { background: #171717; border-bottom: 1px solid #2E2E2E; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
    .header-brand { display: flex; align-items: center; gap: 10px; font-size: 18px; font-weight: 800; color: #FF6B2C; }
    .header-meta { font-size: 12px; color: #737373; }
    .container { max-width: 1400px; margin: 0 auto; padding: 24px; }
    .days-picker { display: flex; gap: 8px; margin-bottom: 24px; }
    .day-btn { background: #262626; border: 1px solid #404040; color: #A3A3A3; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600; transition: all .15s; }
    .day-btn.active, .day-btn:hover { background: #FF6B2C; border-color: #FF6B2C; color: #fff; }
    .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .kpi-card { background: #171717; border: 1px solid #2E2E2E; border-radius: 12px; padding: 20px; }
    .kpi-label { font-size: 11px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: #737373; margin-bottom: 8px; }
    .kpi-value { font-size: 28px; font-weight: 900; color: #FAFAFA; font-family: 'JetBrains Mono', monospace; }
    .kpi-sub { font-size: 12px; color: #737373; margin-top: 4px; }
    .charts-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 16px; margin-bottom: 24px; }
    .chart-card { background: #171717; border: 1px solid #2E2E2E; border-radius: 12px; padding: 20px; }
    .chart-title { font-size: 13px; font-weight: 700; color: #A3A3A3; margin-bottom: 16px; text-transform: uppercase; letter-spacing: .04em; }
    canvas { width: 100% !important; max-height: 200px; }
    .table-card { background: #171717; border: 1px solid #2E2E2E; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
    .table-title { font-size: 13px; font-weight: 700; color: #A3A3A3; margin-bottom: 16px; text-transform: uppercase; letter-spacing: .04em; }
    .data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .data-table th { padding: 8px 12px; text-align: left; color: #737373; font-weight: 700; font-size: 11px; text-transform: uppercase; letter-spacing: .04em; border-bottom: 1px solid #2E2E2E; }
    .data-table td { padding: 8px 12px; border-bottom: 1px solid #1C1C1C; color: #A3A3A3; font-family: 'JetBrains Mono', monospace; }
    .data-table td:first-child { color: #FAFAFA; font-family: 'Inter', sans-serif; }
    .data-table tr:last-child td { border-bottom: none; }
    .data-table tr:hover td { background: #1C1C1C; }
    .bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .bar-label { font-size: 12px; color: #A3A3A3; min-width: 120px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .bar-track { flex: 1; background: #262626; border-radius: 3px; height: 8px; }
    .bar-fill { background: #FF6B2C; border-radius: 3px; height: 8px; transition: width .3s; }
    .bar-val { font-size: 12px; color: #737373; min-width: 40px; text-align: right; font-family: 'JetBrains Mono', monospace; }
    .refresh-btn { background: #FF6B2C; border: none; color: #fff; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; }
    .last-updated { font-size: 12px; color: #737373; margin-left: 12px; }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 900px) { .charts-grid { grid-template-columns: 1fr; } .two-col { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<div class="header">
  <div class="header-brand">
    <svg width="28" height="28" viewBox="0 0 28 28" fill="none"><rect width="28" height="28" rx="7" fill="#FF6B2C"/><path d="M5 14h4l2-5.5 3.5 11 2-7.5 1.5 2H23" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    Tokenia Admin
  </div>
  <div class="header-meta">
    <button class="refresh-btn" onclick="loadData()">↻ Refresh</button>
    <span class="last-updated" id="last-updated">Loading…</span>
  </div>
</div>

<div class="container">
  <div class="days-picker">
    <button class="day-btn" onclick="setDays(1)">24h</button>
    <button class="day-btn active" onclick="setDays(7)">7d</button>
    <button class="day-btn" onclick="setDays(30)">30d</button>
  </div>

  <div class="kpi-grid">
    <div class="kpi-card"><div class="kpi-label">Total Events</div><div class="kpi-value" id="kpi-events">—</div><div class="kpi-sub">Tracked interactions</div></div>
    <div class="kpi-card"><div class="kpi-label">Unique Sessions</div><div class="kpi-value" id="kpi-sessions">—</div><div class="kpi-sub">Anonymous (no PII)</div></div>
    <div class="kpi-card"><div class="kpi-label">Top Event</div><div class="kpi-value" id="kpi-top-event" style="font-size:16px;">—</div><div class="kpi-sub" id="kpi-top-count">—</div></div>
    <div class="kpi-card"><div class="kpi-label">Top Language</div><div class="kpi-value" id="kpi-top-lang" style="font-size:16px;">—</div><div class="kpi-sub" id="kpi-lang-pct">—</div></div>
  </div>

  <div class="charts-grid">
    <div class="chart-card">
      <div class="chart-title">Events by Day</div>
      <canvas id="chart-daily"></canvas>
    </div>
    <div class="chart-card">
      <div class="chart-title">Languages</div>
      <div id="lang-bars"></div>
    </div>
  </div>

  <div class="two-col">
    <div class="table-card">
      <div class="table-title">Top Events</div>
      <div id="events-bars"></div>
    </div>
    <div class="table-card">
      <div class="table-title">Top Pages</div>
      <div id="pages-bars"></div>
    </div>
  </div>

  <div class="two-col">
    <div class="table-card">
      <div class="table-title">Countries</div>
      <div id="countries-bars"></div>
    </div>
    <div class="table-card">
      <div class="table-title">Health Check</div>
      <div id="health-data">Loading…</div>
    </div>
  </div>
</div>

<script>
let _days = 7;
let _chart = null;

function setDays(d) {
  _days = d;
  document.querySelectorAll('.day-btn').forEach((b,i) => b.classList.toggle('active', [1,7,30][i]===d));
  loadData();
}

async function loadData() {
  document.getElementById('last-updated').textContent = 'Loading…';
  try {
    const [analyticsRes, healthRes] = await Promise.all([
      fetch(`/api/analytics?days=${_days}`),
      fetch('/api/health-detail'),
    ]);
    const data   = await analyticsRes.json();
    const health = await healthRes.json();
    renderDashboard(data);
    renderHealth(health);
    document.getElementById('last-updated').textContent = 'Updated ' + new Date().toLocaleTimeString();
  } catch (e) {
    document.getElementById('last-updated').textContent = 'Error: ' + e.message;
  }
}

function renderDashboard(data) {
  document.getElementById('kpi-events').textContent   = (data.totalEvents || 0).toLocaleString();
  document.getElementById('kpi-sessions').textContent = (data.uniqueSessions || 0).toLocaleString();

  const topEvent = Object.entries(data.events || {})[0] || ['—', 0];
  document.getElementById('kpi-top-event').textContent = topEvent[0];
  document.getElementById('kpi-top-count').textContent = topEvent[1] + ' times';

  const topLang = Object.entries(data.langs || {})[0] || ['—', 0];
  const langFlags = { en: '🇺🇸', es: '🇪🇸', pt: '🇧🇷', zh: '🇨🇳', de: '🇩🇪' };
  document.getElementById('kpi-top-lang').textContent = (langFlags[topLang[0]] || '') + ' ' + topLang[0].toUpperCase();
  const langPct = data.totalEvents ? Math.round(topLang[1]/data.totalEvents*100) : 0;
  document.getElementById('kpi-lang-pct').textContent = langPct + '% of sessions';

  // Daily chart
  renderLineChart('chart-daily', data.byDay || {});

  // Bar lists
  renderBars('events-bars', data.events || {});
  renderBars('pages-bars', data.pages || {});
  renderBars('lang-bars', data.langs || {});
  renderBars('countries-bars', data.countries || {});
}

function renderBars(containerId, obj) {
  const container = document.getElementById(containerId);
  if (!container) return;
  const entries = Object.entries(obj).slice(0, 10);
  if (!entries.length) { container.innerHTML = '<p style="color:#737373;font-size:13px">No data</p>'; return; }
  const max = entries[0][1];
  container.innerHTML = entries.map(([k, v]) => `
    <div class="bar-row">
      <div class="bar-label" title="${k}">${k}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${Math.round(v/max*100)}%"></div></div>
      <div class="bar-val">${v}</div>
    </div>`).join('');
}

function renderLineChart(canvasId, byDay) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const labels = Object.keys(byDay).sort().slice(-_days);
  const values = labels.map(d => byDay[d] || 0);

  // Simple vanilla line chart
  const W = canvas.offsetWidth || 600;
  const H = 180;
  canvas.width = W; canvas.height = H;

  const max = Math.max(...values, 1);
  const padL = 40, padR = 10, padT = 10, padB = 30;
  const chartW = W - padL - padR;
  const chartH = H - padT - padB;

  ctx.clearRect(0, 0, W, H);

  // Grid lines
  ctx.strokeStyle = '#2E2E2E'; ctx.lineWidth = 1;
  [0.25, 0.5, 0.75, 1].forEach(t => {
    const y = padT + chartH * (1 - t);
    ctx.beginPath(); ctx.moveTo(padL, y); ctx.lineTo(W - padR, y); ctx.stroke();
    ctx.fillStyle = '#737373'; ctx.font = '10px Inter'; ctx.textAlign = 'right';
    ctx.fillText(Math.round(max * t), padL - 4, y + 3);
  });

  if (!labels.length) return;
  const step = chartW / Math.max(labels.length - 1, 1);

  // Gradient fill
  const grad = ctx.createLinearGradient(0, padT, 0, padT + chartH);
  grad.addColorStop(0, 'rgba(255,107,44,.35)');
  grad.addColorStop(1, 'rgba(255,107,44,0)');

  ctx.beginPath();
  ctx.moveTo(padL, padT + chartH * (1 - values[0] / max));
  values.forEach((v, i) => ctx.lineTo(padL + i * step, padT + chartH * (1 - v / max)));
  ctx.lineTo(padL + (values.length - 1) * step, padT + chartH);
  ctx.lineTo(padL, padT + chartH);
  ctx.closePath();
  ctx.fillStyle = grad; ctx.fill();

  // Line
  ctx.beginPath();
  ctx.moveTo(padL, padT + chartH * (1 - values[0] / max));
  values.forEach((v, i) => ctx.lineTo(padL + i * step, padT + chartH * (1 - v / max)));
  ctx.strokeStyle = '#FF6B2C'; ctx.lineWidth = 2.5;
  ctx.lineJoin = 'round'; ctx.stroke();

  // Labels
  ctx.fillStyle = '#737373'; ctx.font = '10px Inter'; ctx.textAlign = 'center';
  const skip = Math.ceil(labels.length / 7);
  labels.forEach((d, i) => {
    if (i % skip === 0) ctx.fillText(d.slice(5), padL + i * step, H - 8);
  });
}

function renderHealth(h) {
  const statusColor = h.status === 'ok' ? '#22c55e' : '#f59e0b';
  document.getElementById('health-data').innerHTML = `
    <div style="display:grid;gap:8px;font-size:13px;">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
        <span style="color:${statusColor};font-size:20px;">●</span>
        <strong style="color:#FAFAFA;font-size:16px;">${h.status?.toUpperCase()}</strong>
      </div>
      ${row('Version', h.version)}
      ${row('Uptime', h.uptime_human)}
      ${row('Memory', `${h.memory_mb}MB / ${h.memory_limit_mb}MB (${h.memory_percent}%)`)}
      ${row('Models loaded', h.models_loaded)}
      ${row('Node', h.node_version)}
      ${row('Pricing updated', h.last_pricing_update?.slice(0,10))}
    </div>`;
}

function row(k, v) {
  return `<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #1C1C1C;">
    <span style="color:#737373;">${k}</span>
    <span style="color:#FAFAFA;font-family:'JetBrains Mono',monospace;">${v || '—'}</span>
  </div>`;
}

// Auto-refresh every 60 seconds
setInterval(loadData, 60000);
loadData();
</script>
</body>
</html>
