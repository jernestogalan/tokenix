<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account — Tokenia</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%23FF6B2C'/><path d='M8 16h4l2-5 3 10 2-7 1.5 2H24' stroke='white' stroke-width='2.2' stroke-linecap='round' stroke-linejoin='round' fill='none'/></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css?v=5">
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a href="/" class="nav-brand" style="text-decoration:none">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
        <defs><linearGradient id="nb" x1="0" y1="0" x2="28" y2="28" gradientUnits="userSpaceOnUse">
          <stop stop-color="#FF6B2C"/><stop offset="1" stop-color="#ff9a5c"/>
        </linearGradient></defs>
        <rect width="28" height="28" rx="7" fill="url(#nb)"/>
        <path d="M5 14h4l2-5.5 3.5 11 2-7.5 1.5 2H23" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span>Tokenia</span>
    </a>
    <div style="margin-left:auto">
      <a href="/auth/signin" class="btn btn-ghost btn-sm" style="text-decoration:none">Sign in</a>
    </div>
  </div>
</nav>

<div class="auth-page">
  <div class="auth-card">
    <div class="auth-card-header">
      <h1 class="auth-title">Create your account</h1>
      <p class="auth-sub">Free forever. No credit card required.</p>
    </div>

    <form id="signup-form" class="auth-form" novalidate>
      <div class="form-group">
        <label for="email" class="form-label">Email</label>
        <input type="email" id="email" name="email" required
          class="form-input" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label for="password" class="form-label">Password</label>
        <input type="password" id="password" name="password" required
          class="form-input" placeholder="At least 8 characters" autocomplete="new-password">
        <p class="form-hint">Minimum 8 characters</p>
      </div>

      <div id="auth-error" class="auth-error" style="display:none"></div>
      <div id="auth-success" class="auth-success" style="display:none"></div>

      <button type="submit" id="submit-btn" class="btn btn-primary btn-block">
        Create Free Account
      </button>
    </form>

    <p class="auth-switch">
      Already have an account?
      <a href="/auth/signin" class="auth-link">Sign in</a>
    </p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
(function() {
  const SUPABASE_URL      = '{{ SUPABASE_URL }}';
  const SUPABASE_ANON_KEY = '{{ SUPABASE_ANON_KEY }}';

  if (!SUPABASE_URL || SUPABASE_URL === '{{ SUPABASE_URL }}') {
    document.getElementById('auth-error').textContent = 'Auth not configured yet.';
    document.getElementById('auth-error').style.display = '';
    return;
  }

  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const form      = document.getElementById('signup-form');
  const errorDiv  = document.getElementById('auth-error');
  const successDiv= document.getElementById('auth-success');
  const submitBtn = document.getElementById('submit-btn');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errorDiv.style.display = 'none';
    successDiv.style.display = 'none';

    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    if (password.length < 8) {
      errorDiv.textContent = 'Password must be at least 8 characters.';
      errorDiv.style.display = '';
      return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = 'Creating account…';

    try {
      const { data, error } = await sb.auth.signUp({ email, password });

      if (error) {
        errorDiv.textContent = error.message;
        errorDiv.style.display = '';
        return;
      }

      // Show success — Supabase sends confirmation email
      successDiv.innerHTML = `
        <strong>✓ Account created!</strong><br>
        Check your email (<em>${email}</em>) and click the confirmation link to activate your account.
      `;
      successDiv.style.display = '';
      form.style.display = 'none';

    } catch (err) {
      errorDiv.textContent = 'An unexpected error occurred. Please try again.';
      errorDiv.style.display = '';
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = 'Create Free Account';
    }
  });
})();
</script>
</body>
</html>
