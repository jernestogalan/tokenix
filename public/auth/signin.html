<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Tokenia</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%23FF6B2C'/><path d='M8 16h4l2-5 3 10 2-7 1.5 2H24' stroke='white' stroke-width='2.2' stroke-linecap='round' stroke-linejoin='round' fill='none'/></svg>">
  <link rel="stylesheet" href="/css/style.css?v=5">
  <style>
    body { background-color:#FAFAFA; display:flex; align-items:center; justify-content:center; min-height:100vh; padding:24px; margin:0; }
    .auth-container { width:100%; max-width:420px; background:white; border-radius:8px; border:1px solid #E5E5E5; padding:40px 32px; }
  </style>
</head>
<body>
<nav class="nav" style="position:fixed;top:0;left:0;right:0;width:100%;z-index:1000;">
  <div class="nav-inner">
    <div class="nav-logo" style="cursor:pointer;font-size:18px;" onclick="window.location.href='/'">⚡ Tokenia</div>
    <div style="margin-left:auto;"></div>
  </div>
</nav>

<div class="auth-container">
  <h1 style="text-align:center;margin-bottom:8px;font-size:28px;font-weight:900;color:#1A1A1A;">Sign in</h1>
  <p style="text-align:center;color:#666;margin-bottom:32px;font-size:14px;">Welcome back to Tokenia</p>

  <form id="signin-form" style="display:flex;flex-direction:column;gap:16px;">
    <div>
      <label for="email" style="display:block;margin-bottom:8px;font-weight:600;color:#1A1A1A;">Email</label>
      <input type="email" id="email" name="email" required placeholder="you@example.com" autocomplete="email"
        style="width:100%;padding:12px;border:1px solid #E5E5E5;border-radius:6px;font-size:14px;box-sizing:border-box;">
    </div>
    <div>
      <label for="password" style="display:block;margin-bottom:8px;font-weight:600;color:#1A1A1A;">Password</label>
      <input type="password" id="password" name="password" required placeholder="••••••••" autocomplete="current-password"
        style="width:100%;padding:12px;border:1px solid #E5E5E5;border-radius:6px;font-size:14px;box-sizing:border-box;">
    </div>
    <div id="error-box" style="display:none;padding:12px;background-color:#FEE;border:1px solid #F88;border-radius:6px;color:#C33;font-size:13px;"></div>
    <button type="submit" class="btn btn-primary" style="width:100%;margin-top:8px;font-size:15px;font-weight:600;">Sign In</button>
  </form>

  <p style="text-align:center;color:#666;font-size:14px;margin-top:24px;">
    Don't have an account?
    <a href="/auth/signup" style="color:#FF6B2C;text-decoration:none;font-weight:600;">Create one free</a>
  </p>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  var form     = document.getElementById('signin-form');
  var errorBox = document.getElementById('error-box');

  function showError(msg) {
    errorBox.textContent = msg;
    errorBox.style.display = 'block';
  }

  function initSupabase(supabaseUrl, supabaseAnonKey) {
    var supabase = window.supabase.createClient(supabaseUrl, supabaseAnonKey);

    form.addEventListener('submit', async function(e) {
      e.preventDefault();
      var email    = document.getElementById('email').value.trim();
      var password = document.getElementById('password').value;
      var btn      = e.target.querySelector('button[type="submit"]');

      btn.disabled    = true;
      btn.textContent = 'Signing in...';
      errorBox.style.display = 'none';

      try {
        var result = await supabase.auth.signInWithPassword({ email: email, password: password });
        var data   = result.data;
        var error  = result.error;

        if (error) {
          showError(error.message || 'Sign in failed. Check your credentials.');
          btn.disabled    = false;
          btn.textContent = 'Sign In';
          return;
        }
        if (data && data.user) {
          localStorage.setItem('supabase_user',    JSON.stringify(data.user));
          localStorage.setItem('supabase_session', JSON.stringify(data.session));
          window.location.href = '/dashboard';
        }
      } catch (err) {
        console.error('Sign in error:', err);
        showError('An error occurred. Please try again.');
        btn.disabled    = false;
        btn.textContent = 'Sign In';
      }
    });
  }

  // Load config from server (Railway env vars are exposed via /api/config)
  fetch('/api/config')
    .then(function(r) { return r.json(); })
    .then(function(config) {
      if (!config.supabaseUrl || !config.supabaseAnonKey || !config.authEnabled) {
        showError('Auth not configured yet. Add SUPABASE_URL + SUPABASE_ANON_KEY to your Railway variables.');
        form.style.display = 'none';
      } else {
        initSupabase(config.supabaseUrl, config.supabaseAnonKey);
      }
    })
    .catch(function(err) {
      console.error('Failed to load config:', err);
      showError('Could not load configuration. Please refresh the page.');
    });
</script>
</body>
</html>
