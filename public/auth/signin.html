<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Tokenia</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%23FF6B2C'/><path d='M8 16h4l2-5 3 10 2-7 1.5 2H24' stroke='white' stroke-width='2.2' stroke-linecap='round' stroke-linejoin='round' fill='none'/></svg>">
  <link rel="stylesheet" href="/css/style.css?v=5">
  <style>
    body { background-color:#FAFAFA; display:flex; align-items:center; justify-content:center; min-height:100vh; padding:24px; }
    .auth-container { width:100%; max-width:420px; background:white; border-radius:8px; border:1px solid #E5E5E5; padding:40px 32px; margin-top:60px; }
  </style>
</head>
<body>
<nav class="nav" style="position:fixed;top:0;left:0;right:0;z-index:1000;">
  <div class="nav-inner">
    <a href="/" class="nav-brand" style="text-decoration:none">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none"><defs><linearGradient id="nb" x1="0" y1="0" x2="28" y2="28" gradientUnits="userSpaceOnUse"><stop stop-color="#FF6B2C"/><stop offset="1" stop-color="#ff9a5c"/></linearGradient></defs><rect width="28" height="28" rx="7" fill="url(#nb)"/><path d="M5 14h4l2-5.5 3.5 11 2-7.5 1.5 2H23" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span>Tokenia</span>
    </a>
    <div style="margin-left:auto;">
      <a href="/auth/signup" class="btn btn-ghost btn-sm" style="text-decoration:none">Create account</a>
    </div>
  </div>
</nav>

<div class="auth-container">
  <h1 style="text-align:center;margin-bottom:8px;font-size:28px;font-weight:900;">Sign in</h1>
  <p style="text-align:center;color:#666;margin-bottom:32px;font-size:14px;">Welcome back to Tokenia</p>

  <form id="signin-form" style="display:flex;flex-direction:column;gap:16px;">
    <div>
      <label for="email" style="display:block;margin-bottom:8px;font-weight:600;color:#1A1A1A;">Email</label>
      <input type="email" id="email" name="email" required placeholder="you@example.com" autocomplete="email"
        style="width:100%;padding:12px;border:1px solid #E5E5E5;border-radius:6px;font-size:14px;box-sizing:border-box;">
    </div>
    <div>
      <label for="password" style="display:block;margin-bottom:8px;font-weight:600;color:#1A1A1A;">Password</label>
      <input type="password" id="password" name="password" required placeholder="••••••••" autocomplete="current-password"
        style="width:100%;padding:12px;border:1px solid #E5E5E5;border-radius:6px;font-size:14px;box-sizing:border-box;">
    </div>
    <div id="error-box" style="display:none;padding:12px;background-color:#FEE;border:1px solid #F88;border-radius:6px;color:#C33;font-size:13px;"></div>
    <button type="submit" class="btn btn-primary" style="width:100%;margin-top:8px;font-size:15px;font-weight:600;">Sign In</button>
  </form>

  <p style="text-align:center;color:#666;font-size:14px;margin-top:24px;">
    Don't have an account?
    <a href="/auth/signup" style="color:#FF6B2C;text-decoration:none;font-weight:600;">Create one free</a>
  </p>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
  const SUPABASE_URL      = '{{ SUPABASE_URL }}';
  const SUPABASE_ANON_KEY = '{{ SUPABASE_ANON_KEY }}';
  const form     = document.getElementById('signin-form');
  const errorBox = document.getElementById('error-box');

  if (!SUPABASE_URL || SUPABASE_URL === '{{ SUPABASE_URL }}') {
    errorBox.textContent = 'Auth not configured yet. Add SUPABASE_URL + SUPABASE_ANON_KEY to Railway variables.';
    errorBox.style.display = 'block';
    form.style.display = 'none';
  } else {
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Redirect if already signed in
    supabase.auth.getSession().then(({ data: { session } }) => {
      if (session) window.location.href = '/dashboard';
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn      = e.target.querySelector('button[type="submit"]');

      errorBox.style.display = 'none';
      btn.disabled    = true;
      btn.textContent = 'Signing in…';

      try {
        const { data, error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) throw error;
        if (data?.user) {
          localStorage.setItem('supabase_user', JSON.stringify(data.user));
          window.location.href = '/dashboard';
        }
      } catch (err) {
        errorBox.textContent = err.message || 'Sign in failed. Check your email and password.';
        errorBox.style.display = 'block';
        btn.disabled    = false;
        btn.textContent = 'Sign In';
      }
    });

    // Enter key support
    document.getElementById('password').addEventListener('keydown', e => {
      if (e.key === 'Enter') form.requestSubmit();
    });
  }
</script>
</body>
</html>
