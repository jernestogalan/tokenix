# nginx.conf — reverse proxy for Tokenix
# Place this file at /etc/nginx/conf.d/tokenix.conf on your server
# (or use the docker-compose volume mount).
#
# Prerequisites:
#   - Certbot / Let's Encrypt cert at /etc/letsencrypt/live/yourdomain.com/
#   - Replace "yourdomain.com" with your actual domain
#   - The Node app must be running on 127.0.0.1:3000 (or "tokenix:3000" in Docker)

upstream tokenix_upstream {
    server 127.0.0.1:3000;   # Change to "tokenix:3000" when running in Docker Compose
    keepalive 64;
}

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com www.yourdomain.com;

    # Allow Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ─────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    # TLS certificates (Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # HSTS (1 year)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Security headers (helmet handles most of these on the Node side too)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Upload size limit — must match server.js (10 MB)
    client_max_body_size 10m;

    # Gzip (complements Node's compression middleware)
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/javascript;

    # Static assets — long cache TTL
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        proxy_pass http://tokenix_upstream;
        proxy_cache_valid 200 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    # Stripe webhook — no buffering, pass raw body
    location /api/billing/webhook {
        proxy_pass       http://tokenix_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
    }

    # All other requests
    location / {
        proxy_pass       http://tokenix_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts for heavy processing (PDF parsing, tokenization)
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
